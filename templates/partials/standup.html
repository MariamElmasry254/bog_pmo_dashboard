<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standup — Envnt PMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F0F4F8;min-height:100vh;}
.nav{background:#1B2A4E;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:15px;font-weight:800;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 14px;}
.nav-title{font-size:12px;color:rgba(255,255,255,.45);}
.nav-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);background:transparent;text-decoration:none;}
.nav-btn:hover{background:rgba(255,255,255,.1);}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px;}
.hrow{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.hrow h1{font-size:20px;font-weight:700;color:#1B2A4E;}
.hrow p{font-size:12px;color:#64748B;margin-top:3px;}
.date-nav{display:flex;align-items:center;gap:10px;}
.date-nav button{width:32px;height:32px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;font-size:16px;}
.date-nav button:hover{background:#F1F5F9;}
.date-lbl{font-size:13px;font-weight:600;color:#1B2A4E;min-width:160px;text-align:center;}
.layout{display:grid;grid-template-columns:230px 1fr;gap:16px;min-height:400px;}
.sidebar{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;align-self:start;}
.sidebar-head{padding:12px 16px;border-bottom:1px solid #F1F5F9;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;}
.mem-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:0.5px solid #F8FAFC;}
.mem-item:last-child{border-bottom:none;}
.mem-item:hover{background:#F8FAFC;}
.mem-item.active{background:#EFF6FF;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.mem-info{flex:1;min-width:0;}
.mem-name{font-size:12px;font-weight:600;color:#1B2A4E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mem-sub{font-size:10px;color:#94A3B8;margin-top:1px;}
.mem-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mem-dot.logged{background:#10B981;}
.mem-dot.absent{background:#E2E8F0;}
.content{display:flex;flex-direction:column;gap:12px;}
.empty-select{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:60px;text-align:center;color:#94A3B8;font-size:14px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.col-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;}
.col-head{padding:10px 14px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;}
.col-cnt{font-size:11px;font-weight:600;padding:1px 7px;border-radius:5px;background:#F1F5F9;color:#64748B;}
.col-cnt.warn{background:#FEE2E2;color:#991B1B;}
.col-body{padding:10px 12px;}
.ti{padding:12px 12px;background:#F8FBFF;border:1px solid #E8EFF8;border-radius:10px;margin-bottom:8px;}
.ti:last-child{margin-bottom:0;}
.ti-name{font-size:13px;font-weight:600;color:#1B2A4E;line-height:1.4;}
.ti-phase{font-size:10px;color:#3B82F6;margin-top:3px;font-weight:600;}
.ti-parent{font-size:10px;color:#94A3B8;margin-top:2px;}
.ti-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.ti-stat{display:flex;flex-direction:column;}
.ti-stat-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#94A3B8;}
.ti-stat-val{font-size:13px;font-weight:700;color:#1B2A4E;margin-top:1px;}
.prog-bg{background:#E2E8F0;border-radius:2px;height:3px;margin-top:5px;}
.prog-fill{height:3px;border-radius:2px;}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;display:inline-block;margin-top:3px;}
.tag.first{background:#D1FAE5;color:#065F46;}
.tag.stale{background:#FEF3C7;color:#92400E;}
.tag.closed{background:#FEE2E2;color:#991B1B;}
.empty-col{font-size:11px;color:#CBD5E1;text-align:center;padding:20px 0;}
/* motivational banner */
.motiv{background:#1B2A4E;border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.motiv-emoji{font-size:22px;}
.motiv-text{font-size:13px;font-weight:600;color:#fff;}
.motiv-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.loading{text-align:center;padding:40px;color:#94A3B8;font-size:13px;}
</style>
</head>
<body>
<nav class="nav">
  <div style="display:flex;align-items:center;">
    <span class="nav-logo">envnt.</span>
    <span class="nav-sep"></span>
    <span class="nav-title" id="navTitle">Daily Standup</span>
  </div>
  <a href="javascript:history.back()" class="nav-btn">Back</a>
</nav>

<div class="wrap">
  <div class="hrow">
    <div>
      <h1>Daily Standup</h1>
      <p id="pageSubtitle">Loading...</p>
    </div>
    <div class="date-nav">
      <button onclick="changeDay(-1)">&#8592;</button>
      <span class="date-lbl" id="dateLbl"></span>
      <button onclick="changeDay(1)">&#8594;</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-head">Team Members</div>
      <div id="membersList"><div class="loading">Loading...</div></div>
    </div>
    <div class="content" id="contentArea">
      <div class="empty-select">Select a team member</div>
    </div>
  </div>
</div>

<script>
var AV_COLORS = [
  {bg:'#E6F1FB',c:'#0C447C'},{bg:'#E1F5EE',c:'#085041'},
  {bg:'#FAEEDA',c:'#633806'},{bg:'#FBEAF0',c:'#72243E'},
  {bg:'#EEEDFE',c:'#3C3489'},{bg:'#FAECE7',c:'#712B13'},
  {bg:'#F0FDF4',c:'#166534'},{bg:'#FFF7ED',c:'#92400E'}
];
var urlParams   = new URLSearchParams(window.location.search);
var projId      = urlParams.get('project_id') || '';
var projName    = urlParams.get('project_name') || '';
var currentDate = new Date();
var allMembers  = [];
var selName     = null;
var colorMap    = {};

function strip(name) {
  return (name || '').replace(/^\[[A-Za-z]\d+\s*\]\s*/, '').trim();
}
function initials(name) {
  return strip(name).split(' ').filter(function(p){return p.length>0;}).slice(0,2).map(function(p){return p[0];}).join('').toUpperCase();
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function toISO(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function changeDay(delta) {
  currentDate.setDate(currentDate.getDate()+delta);
  loadStandup();
}
function phaseOf(task) {
  var p = (task.parent||'').toLowerCase();
  var n = (task.name||'').toLowerCase();
  if (p.indexOf('consult')>=0||n.indexOf('consult')>=0) return 'Consultation';
  if (p.indexOf('support')>=0||n.indexOf('support')>=0) return 'Support';
  if (p.indexOf('develop')>=0||n.indexOf('develop')>=0) return 'Development';
  if (p.indexOf('analys')>=0||n.indexOf('analys')>=0)  return 'Analysis';
  if (p.indexOf('service')>=0||n.indexOf('service')>=0) return 'Services';
  return '';
}
function selectMember(idx) {
  selName = allMembers[idx].name;
  document.querySelectorAll('.mem-item').forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-idx')===String(idx));
  });
  renderContent();
}
function renderMembers() {
  if (!allMembers.length) {
    document.getElementById('membersList').innerHTML='<div class="loading" style="color:#CBD5E1;font-size:12px;">No data for this date</div>';
    return;
  }
  var html = '';
  allMembers.forEach(function(m, i) {
    if (!colorMap[m.name]) colorMap[m.name]=AV_COLORS[Object.keys(colorMap).length%AV_COLORS.length];
    var c    = colorMap[m.name];
    var act  = m.name===selName?' active':'';
    var dot  = m.logged_yesterday?'logged':'absent';
    var yCnt = (m.yesterday||[]).length;
    var iCnt = (m.inprogress||[]).length;
    html += '<div class="mem-item'+act+'" data-idx="'+i+'" onclick="selectMember('+i+')">'
      +'<div class="av" style="background:'+c.bg+';color:'+c.c+';">'+initials(m.name)+'</div>'
      +'<div class="mem-info"><div class="mem-name">'+esc(strip(m.name))+'</div>'
      +'<div class="mem-sub">'+yCnt+' yesterday &middot; '+iCnt+' open</div></div>'
      +'<div class="mem-dot '+dot+'"></div></div>';
  });
  document.getElementById('membersList').innerHTML=html;
}
function taskCard(t, mode, idx) {
  var ph  = phaseOf(t);
  var pct = t.planned_hrs>0?Math.min(100,Math.round(t.actual_hrs/t.planned_hrs*100)):0;
  var fc  = t.stale>=2?'#F59E0B':'#3B82F6';
  var nid = 'tnote_'+mode+'_'+idx;

  var html = '<div class="ti">'
    +'<div class="ti-name">'+esc(t.name)+'</div>'
    +(ph?'<div class="ti-phase">'+ph+'</div>':'')
    +(t.parent?'<div class="ti-parent">'+esc(t.parent)+'</div>':'');

  if (mode==='y') {
    // Stats row
    html+='<div class="ti-stats">'
      +'<div class="ti-stat"><span class="ti-stat-lbl">Logged</span><span class="ti-stat-val">'+t.hrs+'h</span></div>'
      +(t.planned_hrs>0?'<div class="ti-stat"><span class="ti-stat-lbl">Planned</span><span class="ti-stat-val">'+t.planned_hrs+'h</span></div>':'')
      +(t.actual_hrs>0?'<div class="ti-stat"><span class="ti-stat-lbl">Actual</span><span class="ti-stat-val">'+t.actual_hrs+'h</span></div>':'')
      +(t.firstEntry?'<div class="ti-stat"><span class="tag first">First entry</span></div>':'')
      +'</div>';
  } else if (mode==='i') {
    html+='<div class="prog-bg"><div class="prog-fill" style="width:'+pct+'%;background:'+fc+';"></div></div>'
      +'<div class="ti-stats" style="margin-top:6px;">'
      +(t.planned_hrs>0?'<div class="ti-stat"><span class="ti-stat-lbl">Planned</span><span class="ti-stat-val">'+t.planned_hrs+'h</span></div>':'')
      +(t.actual_hrs>0?'<div class="ti-stat"><span class="ti-stat-lbl">Actual</span><span class="ti-stat-val">'+t.actual_hrs+'h</span></div>':'')
      +'<div class="ti-stat"><span class="ti-stat-lbl">Remaining</span><span class="ti-stat-val" style="color:'+(t.remaining_hrs>0?'#1B2A4E':'#94A3B8')+';">'+t.remaining_hrs.toFixed(1)+'h</span></div>'
      +(t.first_entry?'<div class="ti-stat"><span class="ti-stat-lbl">Since</span><span class="ti-stat-val" style="color:#64748B;">'+t.first_entry+'</span></div>':'')
      +(t.stale>=2?'<div class="ti-stat"><span class="tag stale">'+t.stale+'d stale</span></div>':'')
      +'</div>';
  } else {
    html+='<div class="ti-stats" style="margin-top:6px;">'
      +(t.planned_hrs>0?'<div class="ti-stat"><span class="ti-stat-lbl">Planned</span><span class="ti-stat-val">'+t.planned_hrs+'h</span></div>':'')
      +(t.actual_hrs>0?'<div class="ti-stat"><span class="ti-stat-lbl">Actual</span><span class="ti-stat-val">'+t.actual_hrs+'h</span></div>':'')
      +'<div class="ti-stat"><span class="tag closed">'+t.remaining_hrs.toFixed(1)+'h remaining</span></div>'
      +'</div>';
  }

  // no per-task note box
  return html+'</div>';
}

function col(title, tasks, mode) {
  var warn = (title.indexOf('Closed')>=0&&tasks.length>0)?' warn':'';
  var body = tasks.length
    ? tasks.map(function(t,i){return taskCard(t,mode,i);}).join('')
    : '<div class="empty-col">'+(mode==='c'?'All clear &#x2713;':mode==='y'?'No hours logged':'No open tasks')+'</div>';
  return '<div class="col-card"><div class="col-head"><span class="col-title">'+title+'</span>'
    +'<span class="col-cnt'+warn+'">'+tasks.length+'</span></div>'
    +'<div class="col-body">'+body+'</div></div>';
}

var MOTIVATIONS = [
  {e:'&#x1F525;', t:'Keep the momentum going!', s:'Every hour logged counts.'},
  {e:'&#x1F3AF;', t:'Stay focused, ship it!', s:'Progress over perfection.'},
  {e:'&#x1F4AA;', t:'Another day, another milestone.', s:'You\'re making it happen.'},
  {e:'&#x26A1;', t:'Energy is high today!', s:'Let\'s close those tasks.'},
  {e:'&#x1F680;', t:'Full speed ahead!', s:'The team is on track.'},
  {e:'&#x2728;', t:'Great work so far!', s:'Keep delivering value.'},
];

function motivBanner(name) {
  var m = MOTIVATIONS[Math.floor(Math.random()*MOTIVATIONS.length)];
  var dName = strip(name);
  return '<div class="motiv">'
    +'<span class="motiv-emoji">'+m.e+'</span>'
    +'<div><div class="motiv-text">'+dName+' — '+m.t+'</div>'
    +'<div class="motiv-sub">'+m.s+'</div></div>'
    +'</div>';
}

function renderContent() {
  if (!selName) { document.getElementById('contentArea').innerHTML='<div class="empty-select">Select a team member</div>'; return; }
  var m=null;
  for (var i=0;i<allMembers.length;i++){if(allMembers[i].name===selName){m=allMembers[i];break;}}
  if (!m) return;
  var html = motivBanner(m.name)
    +'<div class="three-col">'
    +col('Logged Yesterday', m.yesterday||[], 'y')
    +col('In Progress', m.inprogress||[], 'i')
    +col('Closed — Has Remaining', m.closed_with_remaining||[], 'c')
    +'</div>';
  document.getElementById('contentArea').innerHTML=html;
}

function saveTaskNote(inputId, taskId) {
  var inp = document.getElementById(inputId);
  var btn = inp ? inp.nextElementSibling : null;
  if (!inp||!inp.value.trim()||!btn) return;
  var val = inp.value.trim();
  btn.textContent='...'; btn.disabled=true;
  fetch('/api/standup/note',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({member:selName, date:toISO(currentDate), task_id:taskId, note:val})
  }).then(function(){
    btn.innerHTML='&#x2713;'; btn.style.background='#10B981';
    setTimeout(function(){btn.innerHTML='&#x2713;';btn.disabled=false;btn.style.background='';},3000);
  }).catch(function(){btn.innerHTML='&#x2713;';btn.disabled=false;});
}
function saveNote() {
  var inp=document.getElementById('noteInp');
  var btn=inp?inp.nextElementSibling:null;
  if (!inp||!inp.value.trim()||!btn) return;
  btn.textContent='Saving...'; btn.disabled=true;
  fetch('/api/standup/note',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({member:selName,date:toISO(currentDate),note:inp.value.trim()})
  }).then(function(){
    btn.textContent='Saved'; setTimeout(function(){btn.textContent='Save Note';btn.disabled=false;},2000);
  }).catch(function(){btn.textContent='Save Note';btn.disabled=false;});
}
async function loadStandup() {
  document.getElementById('dateLbl').textContent=fmtDate(currentDate);
  var ds=toISO(currentDate);
  var prev=new Date(currentDate); prev.setDate(prev.getDate()-1);
  var ps=toISO(prev);
  var url='/api/standup?date='+ds+'&prev='+ps;
  if (projId)   url+='&project_id='+encodeURIComponent(projId);
  if (projName) url+='&project_name='+encodeURIComponent(projName);
  document.getElementById('membersList').innerHTML='<div class="loading">Loading...</div>';
  try {
    var resp=await fetch(url);
    var data=await resp.json();
    if (!data.ok) throw new Error(data.error||'Failed');
    var merged={};
    Object.keys(data.phases||{}).forEach(function(ph){
      (data.phases[ph]||[]).forEach(function(m){
        if (!merged[m.name]) {
          merged[m.name]=JSON.parse(JSON.stringify(m));
        } else {
          var ex=merged[m.name];
          (m.yesterday||[]).forEach(function(t){if(!ex.yesterday.find(function(x){return x.id===t.id;}))ex.yesterday.push(t);});
          (m.inprogress||[]).forEach(function(t){if(!ex.inprogress.find(function(x){return x.id===t.id;}))ex.inprogress.push(t);});
          (m.closed_with_remaining||[]).forEach(function(t){if(!ex.closed_with_remaining.find(function(x){return x.id===t.id;}))ex.closed_with_remaining.push(t);});
          if (m.logged_yesterday) ex.logged_yesterday=true;
        }
      });
    });
    allMembers=Object.values(merged).sort(function(a,b){
      if (a.logged_yesterday&&!b.logged_yesterday) return -1;
      if (!a.logged_yesterday&&b.logged_yesterday) return 1;
      return strip(a.name).localeCompare(strip(b.name));
    });
    document.getElementById('navTitle').textContent=data.project_name||'Daily Standup';
    document.getElementById('pageSubtitle').textContent=allMembers.length+' team members';
    renderMembers();
    if (selName&&allMembers.find(function(m){return m.name===selName;})) renderContent();
    else { selName=null; document.getElementById('contentArea').innerHTML='<div class="empty-select">Select a team member</div>'; }
  } catch(e) {
    document.getElementById('membersList').innerHTML='<div class="loading" style="color:#DC2626;font-size:12px;">'+e.message+'</div>';
  }
}
loadStandup();
</script>
</body>
</html>
