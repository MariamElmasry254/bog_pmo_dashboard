<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standup — Envnt PMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#F0F4F8;min-height:100vh;}
.nav{background:#1B2A4E;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:15px;font-weight:800;color:#fff;}
.nav-sep{width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 14px;}
.nav-title{font-size:12px;color:rgba(255,255,255,.45);}
.nav-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);background:transparent;text-decoration:none;}
.nav-btn:hover{background:rgba(255,255,255,.1);}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px;}

/* header */
.hrow{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.hrow h1{font-size:20px;font-weight:700;color:#1B2A4E;}
.hrow p{font-size:12px;color:#64748B;margin-top:3px;}
.date-nav{display:flex;align-items:center;gap:10px;}
.date-nav button{width:32px;height:32px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;font-size:16px;}
.date-nav button:hover{background:#F1F5F9;}
.date-lbl{font-size:13px;font-weight:600;color:#1B2A4E;min-width:160px;text-align:center;}

/* phase tabs */
.phase-tabs{display:flex;gap:8px;margin-bottom:20px;}
.ph-tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #E2E8F0;background:#fff;color:#64748B;transition:all .15s;}
.ph-tab.active{background:#1B2A4E;color:#fff;border-color:#1B2A4E;}
.ph-tab:hover:not(.active){background:#F1F5F9;}

/* layout: left sidebar + right content */
.layout{display:grid;grid-template-columns:220px 1fr;gap:16px;min-height:400px;}

/* members sidebar */
.sidebar{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;}
.sidebar-head{padding:12px 16px;border-bottom:1px solid #F1F5F9;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;}
.mem-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:0.5px solid #F8FAFC;transition:background .1s;}
.mem-item:last-child{border-bottom:none;}
.mem-item:hover{background:#F8FAFC;}
.mem-item.active{background:#EFF6FF;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.mem-info{flex:1;min-width:0;}
.mem-name{font-size:12px;font-weight:600;color:#1B2A4E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mem-sub{font-size:10px;color:#94A3B8;margin-top:1px;}
.mem-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mem-dot.logged{background:#10B981;}
.mem-dot.absent{background:#E2E8F0;}

/* content area */
.content{display:flex;flex-direction:column;gap:12px;}
.empty-select{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:60px;text-align:center;color:#94A3B8;font-size:14px;}

/* 3 col sections */
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.col-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;}
.col-head{padding:10px 14px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;}
.col-cnt{font-size:11px;font-weight:600;padding:1px 7px;border-radius:5px;background:#F1F5F9;color:#64748B;}
.col-cnt.warn{background:#FEE2E2;color:#991B1B;}
.col-body{padding:10px 12px;}

/* task item */
.ti{padding:9px 10px;background:#F8FAFC;border-radius:8px;margin-bottom:6px;}
.ti:last-child{margin-bottom:0;}
.ti-name{font-size:12px;font-weight:600;color:#1B2A4E;line-height:1.35;}
.ti-parent{font-size:10px;color:#94A3B8;margin-top:2px;}
.ti-row{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.ti-meta{font-size:10px;color:#64748B;}
.ti-val{font-size:12px;font-weight:700;color:#1B2A4E;}
.prog-bg{background:#E2E8F0;border-radius:2px;height:3px;margin-top:5px;}
.prog-fill{height:3px;border-radius:2px;}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;display:inline-block;margin-top:3px;}
.tag.first{background:#D1FAE5;color:#065F46;}
.tag.stale{background:#FEF3C7;color:#92400E;}
.tag.closed{background:#FEE2E2;color:#991B1B;}
.empty-col{font-size:11px;color:#CBD5E1;text-align:center;padding:20px 0;}

/* note */
.note-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.note-card input{flex:1;font-size:13px;border:none;border-bottom:1px solid #E2E8F0;padding:4px 0;outline:none;background:transparent;color:#1E293B;font-family:'Inter',sans-serif;}
.note-card input::placeholder{color:#CBD5E1;}
.note-card button{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:#1B2A4E;color:#fff;border:none;}

.loading{text-align:center;padding:60px;color:#94A3B8;font-size:14px;}
</style>
</head>
<body>
<nav class="nav">
  <div style="display:flex;align-items:center;">
    <span class="nav-logo">envnt.</span>
    <span class="nav-sep"></span>
    <span class="nav-title" id="navTitle">Daily Standup</span>
  </div>
  <a href="javascript:history.back()" class="nav-btn">← Back</a>
</nav>

<div class="wrap">
  <div class="hrow">
    <div>
      <h1>Daily Standup</h1>
      <p id="pageSubtitle">Loading…</p>
    </div>
    <div class="date-nav">
      <button onclick="changeDay(-1)">←</button>
      <span class="date-lbl" id="dateLbl"></span>
      <button onclick="changeDay(1)">→</button>
    </div>
  </div>

  <!-- Phase tabs -->
  <div class="phase-tabs" id="phaseTabs"></div>

  <!-- Layout -->
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-head">Team Members</div>
      <div id="membersList"><div class="loading" style="padding:20px;font-size:12px;">Loading…</div></div>
    </div>
    <div class="content" id="contentArea">
      <div class="empty-select">← Select a team member to view their tasks</div>
    </div>
  </div>
</div>

<script>
const AV_COLORS=[
  {bg:'#E6F1FB',c:'#0C447C'},{bg:'#E1F5EE',c:'#085041'},
  {bg:'#FAEEDA',c:'#633806'},{bg:'#FBEAF0',c:'#72243E'},
  {bg:'#EEEDFE',c:'#3C3489'},{bg:'#FAECE7',c:'#712B13'},
  {bg:'#F0FDF4',c:'#166534'},{bg:'#FFF7ED',c:'#92400E'},
];

function displayName(name){
  // Strip [Exxx] or [Rxxx] prefix
  return (name||'').replace(/^\[[A-Z]\d+\]\s*/,'').trim();
}
function initials(name){
  const n = displayName(name);
  return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Get project info from URL or referrer
const urlParams = new URLSearchParams(window.location.search);
let projId   = urlParams.get('project_id') || '';
let projName = urlParams.get('project_name') || '';

// Try to get from opener (parent window)
try{
  if(!projId && window.opener){
    projId   = window.opener.AppState?._overviewData?.project_id || '';
    projName = window.opener.AppState?._overviewData?.project_name || '';
  }
}catch(e){}

let currentDate = new Date();
let currentPhase = '';
let allData = {};
let selectedMember = null;
let memberColorMap = {};

function formatDate(d){
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function toISO(d){ return d.toISOString().slice(0,10); }

function changeDay(delta){
  currentDate.setDate(currentDate.getDate()+delta);
  loadStandup();
}

function selectPhase(ph){
  currentPhase = ph;
  document.querySelectorAll('.ph-tab').forEach(t=>t.classList.toggle('active', t.dataset.phase===ph));
  renderMembers();
  clearContent();
}

function selectMember(name){
  selectedMember = name;
  document.querySelectorAll('.mem-item').forEach(m=>m.classList.toggle('active', m.dataset.name===name));
  renderContent(name);
}

function clearContent(){
  selectedMember = null;
  document.getElementById('contentArea').innerHTML='<div class="empty-select">← Select a team member to view their tasks</div>';
}

function renderPhases(phases){
  const labels = {development:'Development',consultation:'Consultation',services:'Services',support:'Support'};
  document.getElementById('phaseTabs').innerHTML = phases.map(ph=>
    `<button class="ph-tab${ph===currentPhase?' active':''}" data-phase="${ph}" onclick="selectPhase('${ph}')">${labels[ph]||ph}</button>`
  ).join('');
}

function renderMembers(){
  const members = allData.phases?.[currentPhase] || [];
  if(!members.length){
    document.getElementById('membersList').innerHTML='<div class="loading" style="padding:20px;font-size:12px;color:#CBD5E1;">No members in this phase</div>';
    return;
  }
  // assign colors
  members.forEach((m,i)=>{ if(!memberColorMap[m.name]) memberColorMap[m.name]=AV_COLORS[Object.keys(memberColorMap).length%AV_COLORS.length]; });

  document.getElementById('membersList').innerHTML = members.map(m=>{
    const c = memberColorMap[m.name]||AV_COLORS[0];
    const dName = displayName(m.name);
    const ini = initials(m.name);
    const isActive = m.name === selectedMember;
    const ystCount = (m.yesterday||[]).length;
    const inpCount = (m.inprogress||[]).length;
    return `<div class="mem-item${isActive?' active':''}" data-name="${esc(m.name)}" onclick="selectMember(${JSON.stringify(m.name)})">
      <div class="av" style="background:${c.bg};color:${c.c};">${ini}</div>
      <div class="mem-info">
        <div class="mem-name">${esc(dName)}</div>
        <div class="mem-sub">${ystCount} yesterday · ${inpCount} open</div>
      </div>
      <div class="mem-dot ${m.logged_yesterday?'logged':'absent'}"></div>
    </div>`;
  }).join('');
}

function renderContent(memberName){
  const members = allData.phases?.[currentPhase] || [];
  const m = members.find(x=>x.name===memberName);
  if(!m){ document.getElementById('contentArea').innerHTML='<div class="empty-select">Member not found</div>'; return; }

  function colYst(tasks){
    if(!tasks||!tasks.length) return '<div class="empty-col">No hours logged</div>';
    return tasks.map(t=>`
      <div class="ti">
        <div class="ti-name">${esc(t.name)}</div>
        <div class="ti-parent">${esc(t.parent||'')}</div>
        <div class="ti-row">
          <span>${t.firstEntry?'<span class="tag first">First entry</span>':''}</span>
          <span class="ti-val">${t.hrs}h</span>
        </div>
      </div>`).join('');
  }

  function colInp(tasks){
    if(!tasks||!tasks.length) return '<div class="empty-col">No open tasks</div>';
    return tasks.map(t=>{
      const pct = t.planned_hrs>0?Math.min(100,Math.round(t.actual_hrs/t.planned_hrs*100)):0;
      const fc  = t.stale>=2?'#F59E0B':'#3B82F6';
      return `<div class="ti">
        <div class="ti-name">${esc(t.name)}</div>
        <div class="ti-parent">${esc(t.parent||'')}</div>
        <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${fc};"></div></div>
        <div class="ti-row" style="margin-top:4px;">
          <span class="ti-meta">
            ${t.first_entry?'Since '+t.first_entry:''}
            ${t.stale>=2?' · <span class="tag stale">'+t.stale+'d stale</span>':''}
          </span>
          <span class="ti-val">${t.remaining_hrs.toFixed(1)}h left</span>
        </div>
      </div>`;
    }).join('');
  }

  function colClosed(tasks){
    if(!tasks||!tasks.length) return '<div class="empty-col">All clear ✓</div>';
    return tasks.map(t=>`
      <div class="ti">
        <div class="ti-name">${esc(t.name)}</div>
        <div class="ti-parent">${esc(t.parent||'')}</div>
        <div class="ti-row" style="margin-top:5px;">
          <span class="tag closed">Closed w/ remaining</span>
          <span class="ti-val" style="color:#DC2626;">${t.remaining_hrs.toFixed(1)}h</span>
        </div>
      </div>`).join('');
  }

  const hasIssues = (m.closed_with_remaining||[]).length > 0;

  document.getElementById('contentArea').innerHTML = `
    <div class="three-col">
      <div class="col-card">
        <div class="col-head">
          <span class="col-title">Logged Yesterday</span>
          <span class="col-cnt">${(m.yesterday||[]).length}</span>
        </div>
        <div class="col-body">${colYst(m.yesterday)}</div>
      </div>
      <div class="col-card">
        <div class="col-head">
          <span class="col-title">In Progress</span>
          <span class="col-cnt">${(m.inprogress||[]).length}</span>
        </div>
        <div class="col-body">${colInp(m.inprogress)}</div>
      </div>
      <div class="col-card">
        <div class="col-head">
          <span class="col-title">Closed — Has Remaining</span>
          <span class="col-cnt ${hasIssues?'warn':''}">${(m.closed_with_remaining||[]).length}</span>
        </div>
        <div class="col-body">${colClosed(m.closed_with_remaining)}</div>
      </div>
    </div>
    <div class="note-card">
      <input id="noteInp" placeholder="PM standup note for ${esc(m.name)}…">
      <button onclick="saveNote()">Save Note</button>
    </div>`;
}

async function saveNote(){
  const inp = document.getElementById('noteInp');
  const btn = inp.nextElementSibling;
  if(!inp||!inp.value.trim()) return;
  btn.textContent='Saving…'; btn.disabled=true;
  try{
    await fetch('/api/standup/note',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({member:selectedMember, date:toISO(currentDate), note:inp.value.trim()})
    });
    btn.textContent='Saved ✓';
    setTimeout(()=>{btn.textContent='Save Note';btn.disabled=false;},2000);
  }catch(e){btn.textContent='Save Note';btn.disabled=false;}
}

async function loadStandup(){
  document.getElementById('dateLbl').textContent = formatDate(currentDate);
  const dateStr = toISO(currentDate);
  const prevDate = new Date(currentDate); prevDate.setDate(prevDate.getDate()-1);
  const prevStr  = toISO(prevDate);

  let url = `/api/standup?date=${dateStr}&prev=${prevStr}`;
  if(projId)   url += `&project_id=${projId}`;
  if(projName) url += `&project_name=${encodeURIComponent(projName)}`;

  document.getElementById('membersList').innerHTML='<div class="loading" style="padding:20px;font-size:12px;">Loading…</div>';

  try{
    const resp = await fetch(url);
    const data = await resp.json();
    if(!data.ok){ throw new Error(data.error||'Failed'); }

    allData = data;
    const phases = Object.keys(data.phases||{});
    // Pick first phase that has members, or just first phase
    const firstWithMembers = phases.find(ph => (data.phases[ph]||[]).length > 0) || phases[0] || '';
    if(!currentPhase || !phases.includes(currentPhase) || !(data.phases[currentPhase]||[]).length) {
      currentPhase = firstWithMembers;
    }

    document.getElementById('navTitle').textContent = data.project_name || 'Daily Standup';
    document.getElementById('pageSubtitle').textContent = formatDate(currentDate);

    renderPhases(phases);
    renderMembers();

    if(selectedMember){
      const members = allData.phases?.[currentPhase]||[];
      if(members.find(m=>m.name===selectedMember)) renderContent(selectedMember);
      else clearContent();
    }

  }catch(e){
    document.getElementById('membersList').innerHTML=`<div class="loading" style="padding:20px;font-size:12px;color:#DC2626;">${e.message}</div>`;
  }
}

loadStandup();
</script>
</body>
</html>
