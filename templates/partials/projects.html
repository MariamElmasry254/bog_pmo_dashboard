<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Dashboard — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
  body { background: var(--bg); font-family: var(--sans); }
  .proj-header {
    background: var(--navy);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .proj-header h1 { color: white; font-size: 22px; font-weight: 700; margin: 0; }
  .proj-header span { font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: .15em; text-transform: uppercase; }
  .proj-main { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }
  .proj-search-bar {
    display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap;
  }
  .proj-search-bar input {
    flex: 1; min-width: 200px; padding: 9px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: var(--sans);
    background: white; color: var(--text);
  }
  .proj-search-bar input:focus { outline: none; border-color: var(--blue); }
  .stage-pill {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .3px; cursor: pointer; transition: all .15s;
  }
  .stage-pill.active { background: var(--navy); color: white; }
  .stage-pill:not(.active) { background: var(--bg-subtle); color: var(--text-muted); border: 1px solid var(--border); }
  .proj-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
  }
  .proj-card {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 22px; cursor: pointer; transition: all .2s;
    border-left: 4px solid var(--border);
    position: relative; overflow: hidden;
  }
  .proj-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
  .proj-card.status-on_track { border-left-color: var(--green); }
  .proj-card.status-at_risk   { border-left-color: var(--amber); }
  .proj-card.status-off_track { border-left-color: var(--red); }
  .proj-card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .proj-card-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
  .proj-card-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .proj-card-label { color: var(--text-muted); }
  .proj-card-val { font-weight: 600; color: var(--text); }
  .proj-status-badge {
    position: absolute; top: 14px; right: 14px;
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    padding: 3px 8px; border-radius: 8px;
  }
  .badge-on_track  { background: var(--green-light); color: var(--green); }
  .badge-at_risk   { background: var(--amber-light); color: #B45309; }
  .badge-off_track { background: var(--red-light);   color: var(--red); }
  .badge-unknown   { background: var(--bg-subtle);   color: var(--text-muted); }
  .proj-count { font-size: 12px; color: var(--text-muted); padding: 4px 0; }
  .no-projects { text-align: center; padding: 64px; color: var(--text-muted); font-size: 14px; }
  .loading-grid { text-align: center; padding: 64px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="proj-header">
  <div>
    <div style="font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;">Codelab · PMO Dashboard</div>
    <h1>Projects</h1>
  </div>
  <div style="font-size:12px;color:rgba(255,255,255,.6);" id="projCount">Loading…</div>
</div>

<div class="proj-main">

  <!-- Search + Stage filters -->
  <div class="proj-search-bar">
    <input type="text" id="projSearch" placeholder="🔍 Search projects…" oninput="filterProjects()">
    <div id="stageFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>

  <div id="projGrid" class="proj-grid">
    <div class="loading-grid">Loading projects from Odoo…</div>
  </div>
</div>

<script>
let allProjects = [];
let activeStage = 'all';

async function loadProjects() {
  try {
    const res = await fetch('/api/projects/list');
    const d   = await res.json();
    allProjects = d.projects || [];
    buildStageFilters();
    renderProjects();
  } catch(e) {
    document.getElementById('projGrid').innerHTML =
      '<div class="no-projects">⚠️ Could not load projects — check Odoo connection.</div>';
  }
}

function buildStageFilters() {
  const stages = ['all', ...new Set(allProjects.map(p => p.status).filter(Boolean))];
  const labels = { all: 'All', on_track: 'On Track', at_risk: 'At Risk', off_track: 'Off Track', normal: 'Normal' };
  const cont = document.getElementById('stageFilters');
  cont.innerHTML = stages.map(s =>
    `<span class="stage-pill ${s===activeStage?'active':''}" onclick="setStage('${s}')">${labels[s]||s}</span>`
  ).join('');
}

function setStage(stage) {
  activeStage = stage;
  buildStageFilters();
  renderProjects();
}

function filterProjects() {
  renderProjects();
}

function renderProjects() {
  const q = (document.getElementById('projSearch').value || '').toLowerCase();
  let list = allProjects;
  if (activeStage !== 'all') list = list.filter(p => p.status === activeStage);
  if (q) list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.pm||'').toLowerCase().includes(q));

  document.getElementById('projCount').textContent = `${list.length} project${list.length!==1?'s':''}`;

  if (!list.length) {
    document.getElementById('projGrid').innerHTML = '<div class="no-projects">No projects match your filter.</div>';
    return;
  }

  const statusLabel = { on_track:'On Track', at_risk:'At Risk', off_track:'Off Track', normal:'Active' };
  const fmtDate = d => d ? d.slice(0,7).replace('-','/') : '—';
  const fmtVal  = v => v > 0 ? new Intl.NumberFormat('en').format(Math.round(v)) + ' SAR' : '—';

  document.getElementById('projGrid').innerHTML = list.map(p => `
    <div class="proj-card status-${p.status||'unknown'}" onclick="selectProject(${p.id}, ${JSON.stringify(p.name)})">
      <span class="proj-status-badge badge-${p.status||'unknown'}">${statusLabel[p.status]||'Unknown'}</span>
      <div class="proj-card-name">${p.name}</div>
      <div class="proj-card-meta">#${p.id}</div>
      <div class="proj-card-row">
        <span class="proj-card-label">PM</span>
        <span class="proj-card-val">${p.pm || '—'}</span>
      </div>
      ${p.coordinator ? `<div class="proj-card-row">
        <span class="proj-card-label">Coordinator</span>
        <span class="proj-card-val">${p.coordinator}</span>
      </div>` : ''}
      <div class="proj-card-row">
        <span class="proj-card-label">Period</span>
        <span class="proj-card-val">${fmtDate(p.date_start)} → ${fmtDate(p.end_date)}</span>
      </div>
      ${p.value > 0 ? `<div class="proj-card-row">
        <span class="proj-card-label">Value</span>
        <span class="proj-card-val" style="color:var(--blue);">${fmtVal(p.value)}</span>
      </div>` : ''}
    </div>
  `).join('');
}

async function selectProject(id, name) {
  const res = await fetch('/project/select', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ project_id: id, project_name: name })
  });
  const d = await res.json();
  if (d.ok) window.location.href = d.redirect || '/';
}

loadProjects();
</script>
</body>
</html>
