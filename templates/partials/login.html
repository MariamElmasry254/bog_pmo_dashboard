<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envnt PMO — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    font-family: 'Inter', sans-serif;
    background: #EEF2F7;
  }

  /* ── Left navy panel ── */
  .lp-side {
    width: 38%;
    min-height: 100vh;
    background: #1B2A4E;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 56px 48px;
    position: relative;
    overflow: hidden;
  }
  /* subtle grid on navy */
  .lp-side::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
  }
  .lp-logo {
    display: flex; flex-direction: column;
    margin-bottom: 56px;
    position: relative;
  }
  .lp-logo img {
    height: 32px; width: auto;
    mix-blend-mode: screen;
    margin-bottom: 8px;
    display: block;
  }
  .lp-logo-tag {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .14em;
    color: rgba(255,255,255,.35);
  }
  .lp-quote {
    font-size: 14px; line-height: 1.75;
    color: rgba(255,255,255,.55);
    border-left: 2px solid rgba(255,255,255,.15);
    padding-left: 16px;
    margin-bottom: 48px;
    position: relative;
  }
  .lp-dots {
    display: flex; gap: 7px;
    position: relative;
  }
  .lp-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,.2);
  }
  .lp-dot.on { background: rgba(255,255,255,.75); }

  /* ── Right white panel ── */
  .lp-right {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
    padding: 40px 24px;
  }
  /* dot grid on white */
  .lp-right::before {
    content: '';
    position: fixed; inset: 0; left: 38%;
    background-image: radial-gradient(circle, rgba(27,42,78,.07) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }
  .lp-form {
    width: 100%; max-width: 340px;
    position: relative;
  }
  .lp-hello   { font-size: 24px; font-weight: 700; color: #1B2A4E; margin-bottom: 6px; }
  .lp-sub     { font-size: 13px; color: #94A3B8; margin-bottom: 36px; }

  .lp-field   { margin-bottom: 18px; }
  .lp-label   {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em;
    color: #64748B; margin-bottom: 7px;
  }
  .lp-input {
    width: 100%; padding: 11px 14px;
    background: #F8FAFC; border: 1px solid #E2E8F0;
    border-radius: 9px; font-size: 14px; color: #1E293B;
    font-family: 'Inter', sans-serif;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .lp-input:focus {
    border-color: #1B2A4E;
    box-shadow: 0 0 0 3px rgba(27,42,78,.08);
    background: #fff;
  }
  .lp-input::placeholder { color: #CBD5E1; }

  .lp-btn {
    width: 100%; padding: 12px;
    background: #1B2A4E; color: #fff;
    border: none; border-radius: 9px;
    font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer; margin-top: 10px;
    letter-spacing: .01em;
    transition: background .15s, transform .1s;
  }
  .lp-btn:hover  { background: #243660; }
  .lp-btn:active { transform: scale(.99); }
  .lp-btn:disabled { background: #94A3B8; cursor: not-allowed; }

  .lp-error {
    background: #FEF2F2; border: 1px solid #FECACA;
    color: #DC2626; border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    margin-bottom: 20px; display: none;
  }

  .lp-footer {
    text-align: center; margin-top: 32px;
    font-size: 11px; color: #CBD5E1;
  }

  /* ── Responsive: stack on small screens ── */
  @media (max-width: 640px) {
    body { flex-direction: column; }
    .lp-side { width: 100%; min-height: auto; padding: 40px 28px 36px; }
    .lp-quote, .lp-dots { display: none; }
    .lp-logo { margin-bottom: 0; }
    .lp-right::before { left: 0; }
  }
</style>
</head>
<body>

<!-- Left navy panel -->
<div class="lp-side">
  <div class="lp-logo">
    <img src="/static/envnt-logo.png" alt="Envnt">
    <div class="lp-logo-tag">PMO Dashboard</div>
  </div>
  <div class="lp-quote">
    Track projects, manage budgets,<br>
    and deliver insights — all in one place.
  </div>
  <div class="lp-dots">
    <div class="lp-dot on"></div>
    <div class="lp-dot"></div>
    <div class="lp-dot"></div>
  </div>
</div>

<!-- Right white panel -->
<div class="lp-right">
  <div class="lp-form">
    <h1 class="lp-hello">Welcome back</h1>
    <p class="lp-sub">Sign in to access your dashboard</p>

    {% if error %}
    <div class="lp-error" style="display:block;">⚠️ {{ error }}</div>
    {% endif %}
    <div class="lp-error" id="errMsg"></div>

    <div class="lp-field">
      <label class="lp-label" for="username">Username</label>
      <input class="lp-input" type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="lp-field">
      <label class="lp-label" for="password">Password</label>
      <input class="lp-input" type="password" id="password" placeholder="Enter password"
             autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="lp-btn" onclick="doLogin()" id="loginBtn">Sign In →</button>

    <div class="lp-footer">Envnt · Internal PMO Tool · {{ now.year if now else 2026 }}</div>
  </div>
</div>

<script>
async function doLogin() {
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('errMsg');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  if (!u || !p) { showErr('Please enter username and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  errEl.style.display = 'none';
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const d = await res.json();
    if (d.ok) {
      window.location.href = d.redirect || '/projects';
    } else {
      showErr(d.error || 'Invalid credentials');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  } catch(e) {
    showErr('Connection error — please try again.');
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}
document.getElementById('username').focus();
</script>
</body>
</html>
