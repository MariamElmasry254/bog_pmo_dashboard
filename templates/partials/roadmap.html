<section class="tab-panel" id="roadmap">
  <div class="page-header">
    <div>
      <span class="page-eyebrow">PLAN</span>
      <h2 class="page-title">خارطة الطريق — Roadmap</h2>
    </div>
  </div>

  <div class="kpi-strip">
    <div class="kpi-card kpi-blue compact">
      <div class="kpi-label">SERVICES</div>
      <div class="kpi-value"><span id="rmServices">50</span></div>
    </div>
    <div class="kpi-card kpi-green compact">
      <div class="kpi-label">TEAMS</div>
      <div class="kpi-value"><span>2</span></div>
    </div>
    <div class="kpi-card kpi-amber compact">
      <div class="kpi-label">DURATION</div>
      <div class="kpi-value"><span>14</span><span class="kpi-unit">months</span></div>
    </div>
    <div class="kpi-card kpi-navy compact">
      <div class="kpi-label">EXECUTION</div>
      <div class="kpi-value-text">Parallel</div>
    </div>
  </div>

  <div class="section-bar"><span class="section-num">M</span><h2>Key Milestones</h2></div>
  <div class="card">
    <div class="milestones-timeline" id="milestonesTimeline"></div>
  </div>

  <div class="section-bar"><span class="section-num">T</span><h2>Team Workload</h2></div>
  <div class="grid-3" id="teamBreakdown"></div>

  <div class="section-bar"><span class="section-num">S</span><h2>Services Schedule</h2></div>
  <div class="card">
    <div class="table-scroll">
      <table class="data-table" id="roadmapTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Service Name</th>
            <th>Team</th>
            <th>Start</th>
            <th>End</th>
            <th class="num">WD</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>
